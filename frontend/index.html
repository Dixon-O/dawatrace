<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DawaTrace — Pharmaceutical Anti-Counterfeit Verification</title>
  <meta name="description"
    content="Verify medicine authenticity instantly. DawaTrace uses blockchain technology to trace pharmaceutical products from manufacturer to consumer across Kenya.">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap"
    rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css">

  <!-- Favicon -->
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💊</text></svg>">
</head>

<body>

  <!-- Top Navigation -->
  <nav class="topbar" id="topbar">
    <div class="topbar-brand" onclick="navigate('/')">
      <div class="logo">D</div>
      <span>DawaTrace</span>
    </div>
    <div class="topbar-nav" id="topbar-nav">
      <a href="#/" data-route="/">Home</a>
      <a href="#/verify" data-route="/verify">Verify</a>
      <a href="#/track" data-route="/track">Track</a>
      <a href="#/dashboard" data-route="/dashboard">Dashboard</a>
      <a href="#/analytics" data-route="/analytics">Analytics</a>
    </div>
    <div class="topbar-actions" id="topbar-actions">
      <!-- Wallet status injected by JS -->
    </div>
  </nav>

  <!-- Demo Mode Banner (shown when no blockchain) -->
  <div class="demo-banner hidden" id="demo-banner">
    🎮 Demo Mode — Simulated blockchain data for demonstration
  </div>

  <!-- Main Content Area -->
  <main id="app" class="page-content">
    <!-- All page content rendered dynamically by app.js -->
  </main>

  <!-- Footer -->
  <footer class="footer">
    <span>© 2026 DawaTrace · Pharmaceutical Anti-Counterfeit Verification</span>
    <span id="network-status" class="pill pill-purple">◉ Polygon</span>
  </footer>

  <!-- Toast Notifications -->
  <div id="toast-container"></div>

  <!-- Modal Overlay -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal-content"></div>
  </div>

  <!-- Blockchain (ethers.js v6) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.4/ethers.umd.min.js" crossorigin="anonymous"></script>
  <!-- QR Scanner -->
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

  <!-- Application Script -->
  <script src="app.js"></script>
</body>

</html>
