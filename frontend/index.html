<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DawaTrace — Pharmaceutical Verification Platform</title>
  <meta name="description"
    content="Verify medicine authenticity instantly. DawaTrace uses blockchain technology and AI risk scoring to trace pharmaceutical products across global supply chains.">
  <meta name="theme-color" content="#0F172A">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css">

  <!-- Favicon -->
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💊</text></svg>">

  <!-- PWA / Mobile -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>

<body>

  <!-- Top Navigation -->
  <nav class="topbar" id="topbar">
    <div class="topbar-brand" onclick="navigate('/')">
      <div class="logo">D</div>
      <span>DawaTrace</span>
    </div>
    <div class="topbar-nav" id="topbar-nav">
      <a href="#/" data-route="/">Home</a>
      <a href="#/verify" data-route="/verify">Verify</a>
      <a href="#/track" data-route="/track">Track</a>
      <a href="#/dashboard" data-route="/dashboard">Dashboard</a>
      <a href="#/recalls" data-route="/recalls">Recalls</a>
      <a href="#/analytics" data-route="/analytics">Analytics</a>
    </div>
    <div class="topbar-actions" id="topbar-actions">
      <button class="btn btn-soft btn-sm" id="wallet-btn" onclick="BlockchainService.connectWallet()">🔗 Connect Wallet</button>
    </div>
  </nav>

  <!-- Demo Mode Banner -->
  <div class="demo-banner" id="demo-banner">
    🔬 Demo Mode — 1,000 FDA/EMA/Kenya pharmaceutical products loaded for verification
  </div>

  <!-- Main Content Area -->
  <main id="app" class="page-content">
    <div class="verify-spinner container"><div class="spinner-ring"></div><p>Loading DawaTrace...</p></div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <span>© 2026 DawaTrace · Pharmaceutical Verification Platform</span>
    <span id="network-status" class="pill pill-purple">Demo Mode</span>
  </footer>

  <!-- Toast Notifications -->
  <div id="toast-container"></div>

  <!-- Modal Overlay -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal-content"></div>
  </div>

  <!-- Blockchain (ethers.js v6) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.4/ethers.umd.min.js" crossorigin="anonymous"></script>
  <!-- QR + Barcode Scanner (pinned version) -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js" type="text/javascript"></script>

  <!-- Application Script -->
  <script src="app.js"></script>
</body>

</html>
