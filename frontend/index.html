<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DawaTrace — Pharmaceutical Verification Platform</title>
  <meta name="description"
    content="Verify medicine authenticity instantly. DawaTrace uses blockchain technology and AI risk scoring to trace pharmaceutical products across global supply chains.">
  <meta name="theme-color" content="#0F172A">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css">

  <!-- Favicon -->
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💊</text></svg>">

  <!-- PWA / Mobile -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    /* ── Splash screen ── */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #F1F5F9;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }
    #splash.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

    .splash-logo {
      position: relative;
      width: 80px;
      height: 80px;
    }
    /* Outer spinning ring */
    .splash-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: #06B6D4;
      border-right-color: #7C3AED;
      animation: splash-spin 1.2s cubic-bezier(0.4,0,0.2,1) infinite;
    }
    /* Inner slower ring */
    .splash-ring-2 {
      position: absolute;
      inset: 12px;
      border-radius: 50%;
      border: 2px solid transparent;
      border-top-color: #7C3AED44;
      border-bottom-color: #06B6D4;
      animation: splash-spin 1.8s cubic-bezier(0.4,0,0.2,1) infinite reverse;
    }
    /* Centre pill icon */
    .splash-icon {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      animation: splash-pulse 2s ease-in-out infinite;
    }
    @keyframes splash-spin {
      to { transform: rotate(360deg); }
    }
    @keyframes splash-pulse {
      0%, 100% { transform: scale(1);   opacity: 1; }
      50%       { transform: scale(0.88); opacity: 0.75; }
    }

    .splash-wordmark {
      font-family: 'Sora', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: #0F172A;
      letter-spacing: 0.04em;
    }
    .splash-wordmark span {
      background: linear-gradient(90deg, #06B6D4, #7C3AED);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Row of dots beneath */
    .splash-dots {
      display: flex;
      gap: 6px;
    }
    .splash-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #334155;
      animation: dot-wave 1.4s ease-in-out infinite;
    }
    .splash-dots span:nth-child(1) { animation-delay: 0s;    background: #06B6D4; }
    .splash-dots span:nth-child(2) { animation-delay: 0.15s; background: #7C3AED; }
    .splash-dots span:nth-child(3) { animation-delay: 0.3s;  background: #06B6D4; }
    .splash-dots span:nth-child(4) { animation-delay: 0.45s; background: #7C3AED; }
    .splash-dots span:nth-child(5) { animation-delay: 0.6s;  background: #06B6D4; }
    @keyframes dot-wave {
      0%, 80%, 100% { transform: scale(1);   opacity: 0.4; }
      40%            { transform: scale(1.6); opacity: 1; }
    }
  </style>
</head>

<body>

  <!-- ── Splash Screen ── -->
  <div id="splash">
    <div class="splash-logo">
      <div class="splash-ring"></div>
      <div class="splash-ring-2"></div>
      <div class="splash-icon">💊</div>
    </div>
    <div class="splash-wordmark">Dawa<span>Trace</span></div>
    <div class="splash-dots">
      <span></span><span></span><span></span><span></span><span></span>
    </div>

  </div>

  <!-- Top Navigation -->
  <nav class="topbar" id="topbar">
    <div style="display:flex;align-items:center;gap:8px">
      <button class="burger-btn" id="burger-btn" onclick="toggleBurgerMenu()" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <div class="topbar-brand" onclick="navigate('/')">
        <div class="logo">D</div>
        <span>DawaTrace</span>
      </div>
    </div>
    <div class="topbar-nav" id="topbar-nav">
      <a href="#/" data-route="/">Home</a>
      <a href="#/verify" data-route="/verify">Verify</a>
      <a href="#/track" data-route="/track">Track</a>
      <a href="#/dashboard" data-route="/dashboard">Dashboard</a>
    </div>
    <div class="topbar-actions" id="topbar-actions">
      <button class="btn btn-sm login-btn" id="login-btn" onclick="navigate('/login')">
        <span class="login-btn-icon">🔐</span>
        <span class="login-btn-label" id="login-btn-label">Login</span>
      </button>
    </div>
  </nav>

  <!-- Slide-out Sidebar (mobile burger menu) -->
  <div class="burger-backdrop" id="burger-backdrop" onclick="toggleBurgerMenu()"></div>
  <aside class="burger-panel" id="burger-panel">
    <div class="burger-panel-header">
      <div class="burger-role-badge" id="burger-role-badge">
        <span class="burger-role-icon">👤</span>
        <div>
          <div class="burger-role-name" id="burger-role-name">Consumer</div>
          <div class="burger-role-org" id="burger-role-org">Public Access</div>
        </div>
      </div>
    </div>
    <nav class="burger-nav" id="burger-nav">
      <a href="#/" onclick="toggleBurgerMenu()" data-route="/">🏠 Home</a>
      <a href="#/verify" onclick="toggleBurgerMenu()" data-route="/verify">🔍 Verify</a>
      <a href="#/track" onclick="toggleBurgerMenu()" data-route="/track">📦 Track</a>
      <a href="#/dashboard" onclick="toggleBurgerMenu()" data-route="/dashboard">📊 Dashboard</a>
    </nav>
    <div class="burger-panel-footer">
      <button class="btn btn-soft btn-sm w-full" id="burger-login-btn" onclick="toggleBurgerMenu();navigate('/login')">🔐 Login / Switch Role</button>
    </div>
  </aside>

  <!-- Demo Mode Banner (hidden) -->
  <div class="demo-banner" id="demo-banner" style="display:none"></div>

  <!-- Main Content Area -->
  <main id="app" class="page-content"></main>

  <!-- Bottom Navigation (mobile only) -->
  <nav class="bottom-nav" id="bottom-nav">
    <button class="bottom-nav-item" id="bn-home"      onclick="navigate('/')">      <span class="bn-icon">🏠</span><span>Home</span></button>
    <button class="bottom-nav-item" id="bn-verify"    onclick="navigate('/verify')"> <span class="bn-icon">🔍</span><span>Verify</span></button>
    <button class="bottom-nav-item" id="bn-track"     onclick="navigate('/track')">  <span class="bn-icon">📦</span><span>Track</span></button>
    <button class="bottom-nav-item" id="bn-dashboard" onclick="navigate('/dashboard')"><span class="bn-icon">📊</span><span>Dashboard</span></button>
  </nav>

  <!-- Footer -->
  <footer class="footer">
    <span>© 2026 DawaTrace · Pharmaceutical Verification Platform</span>
    <span id="network-status" class="pill pill-purple">Demo Mode</span>
  </footer>

  <!-- Toast Notifications -->
  <div id="toast-container"></div>

  <!-- Modal Overlay -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal-content"></div>
  </div>

  <!-- Blockchain (ethers.js v6) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.4/ethers.umd.min.js" crossorigin="anonymous"></script>
  <!-- QR + Barcode Scanner -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js" type="text/javascript"></script>
  <!-- Global Pharmaceutical Reference Database -->
  <script src="global-reference.js"></script>
  <!-- Application Script -->
  <script src="app.js"></script>

  <script>
    // Dismiss splash once app.js has initialised (fires after DOMContentLoaded + data load)
    // Fallback: hide after 2.2s regardless
    function hideSplash() {
      var s = document.getElementById('splash');
      if (s) s.classList.add('hidden');
    }
    window.addEventListener('dawatraceReady', hideSplash);
    setTimeout(hideSplash, 2200);
  </script>
</body>

</html>
